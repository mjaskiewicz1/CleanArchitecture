name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
    types: [opened, reopened, synchronize, ready_for_review]

jobs:
  # On PR: validates title follows Conventional Commits spec (feat/fix/chore/docs etc.)
  # On push: skipped, downstream jobs treat skipped as success and proceed
  conventional-commits:
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Validate PR title against Conventional Commits spec
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Runs only after conventional-commits passes (or is skipped on push)
  # GitHub treats skipped as success, so push pipeline is never blocked
  build-and-test:
    needs: conventional-commits
    if: always() && (needs.conventional-commits.result == 'success' || needs.conventional-commits.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      checks: write        # required by dorny/test-reporter to post test summary
      pull-requests: write # required by irongut/CodeCoverageSummary to post PR comment
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Restore NuGet dependencies
        run: dotnet restore

      # Checks formatting rules, -v diag prints diff on failure
      # --severity info catches info-level issues not just warnings/errors
      # Migrations excluded because EF generates them outside project style rules
      - name: Verify code formatting (exclude EF migrations)
        run: dotnet format --verify-no-changes --severity info -v diag --exclude **/Migrations/**

      # -v minimal silences per-file output, shows only warnings and errors
      - name: Build solution in Release mode
        run: dotnet build --no-restore --configuration Release -v minimal

      # dotnet-coverage merges results from all test projects into one file
      - name: Install dotnet-coverage tool
        run: dotnet tool install --global dotnet-coverage

      # Runs all tests and collects merged coverage into single coverage.xml
      - name: Run tests with coverage
        run: |
          dotnet-coverage collect \
            "dotnet test --no-restore --no-build --configuration Release --verbosity normal --report-trx --report-trx-filename results.trx" \
            --output coverage.xml \
            --output-format cobertura

      # Uploads TRX and coverage files as artifacts, available in Actions run summary
      - name: Upload test results and coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            backend/**/TestResults/results.trx
            backend/coverage.xml

      # Parses TRX files and shows per-test summary in the Actions tab
      - name: Publish test results summary
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: .NET Tests
          path: backend/**/TestResults/results.trx
          reporter: dotnet-trx
          token: ${{ secrets.GITHUB_TOKEN }}

      # Posts coverage percentage as a comment on the PR
      # thresholds: warn below 60%, fail below 80%
      - name: Post coverage report as PR comment
        uses: irongut/CodeCoverageSummary@v1.3.0
        if: github.event_name == 'pull_request'
        with:
          filename: backend/coverage.xml
          badge: true
          format: markdown
          output: both
          thresholds: '60 80'
