<header class="h-14 flex items-center justify-between px-6 bg-surface-1 border-b border-border shrink-0">
  <button type="button" (click)="menuToggle.emit()" class="md:hidden text-text-muted hover:text-text-main">
    <ng-icon name="heroBars3" class="w-5 h-5" />
  </button>

  <div class="flex items-center gap-4 ml-auto relative">
    @if (user()) {
      <button type="button" (click)="toggleUserMenu()"
        class="flex items-center gap-2 text-hint text-text-muted hover:text-text-main transition-colors">
        <span>{{ user()!.firstName }} {{ user()!.lastName }}</span>
        <ng-icon name="heroChevronDown" class="w-3 h-3" />
      </button>

      @if (userMenuOpen()) {
        <div class="absolute right-0 top-8 w-44 bg-surface-2 border border-border z-50">
          <a routerLink="/profile" (click)="toggleUserMenu()"
             class="flex items-center px-4 h-9 text-body text-text-muted hover:bg-surface-1 hover:text-text-main transition-colors">
            Mój profil
          </a>
          <button type="button" (click)="logout.emit()"
            class="w-full flex items-center px-4 h-9 text-body text-text-muted hover:bg-surface-1 hover:text-text-main transition-colors">
            Wyloguj
          </button>
        </div>
      }
    }
  </div>
</header>
