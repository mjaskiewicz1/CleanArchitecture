<div class="flex h-screen bg-bg" style="font-family: 'IBM Plex Sans', sans-serif;">

  <!-- Sidebar desktop -->
  <aside class="hidden md:flex flex-col w-56 bg-surface-1 border-r border-border shrink-0">
    <ng-container *ngTemplateOutlet="sidebar" />
  </aside>

  <!-- Mobile drawer -->
  @if (menuOpen()) {
    <div class="fixed inset-0 z-30 flex md:hidden">
      <aside class="flex flex-col w-56 bg-surface-1 border-r border-border">
        <ng-container *ngTemplateOutlet="sidebar" />
      </aside>
      <div class="flex-1 bg-black/50" (click)="toggleMenu()"></div>
    </div>
  }

  <div class="flex flex-col flex-1 overflow-hidden min-w-0">
    <app-topbar (menuToggle)="toggleMenu()" (logout)="logout()" />

    <main class="flex-1 overflow-auto p-6">
      <router-outlet />
    </main>
  </div>

</div>

<ng-template #sidebar>
  <div class="flex items-center gap-2.5 px-4 h-14 border-b border-border shrink-0">
    <div class="w-6 h-6 bg-accent flex items-center justify-center shrink-0">
      <svg width="12" height="12" viewBox="0 0 14 14" fill="white"><path d="M7 0L14 7L7 14L0 7Z"/></svg>
    </div>
    <span class="font-mono text-hint font-medium text-text-muted tracking-widest uppercase">Axion · Suite</span>
  </div>

  <nav class="flex-1 py-2">
    <a routerLink="/users" routerLinkActive="bg-surface-2 text-text-main" ariaCurrentWhenActive="page"
       class="flex items-center gap-3 px-4 h-9 text-body text-text-muted hover:bg-surface-2 hover:text-text-main transition-colors">
      <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/>
      </svg>
      Użytkownicy
    </a>
    <a routerLink="/settings" routerLinkActive="bg-surface-2 text-text-main" ariaCurrentWhenActive="page"
       class="flex items-center gap-3 px-4 h-9 text-body text-text-muted hover:bg-surface-2 hover:text-text-main transition-colors">
      <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 010 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 010-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      Ustawienia
    </a>
  </nav>
</ng-template>
